name: Pipeline

on:
  pull_request:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy.
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

concurrency:
  group: pipeline-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref }}
  cancel-in-progress: true

env:
  APP_SLUG: fobs-sms-frontend
  DEPLOYMENT_PATH: deployments/projects/fobs-sms-frontend
  IMAGE_PULL_SECRET: fobs-sms-frontend-registry-secret
  KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'default' }}
  REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || github.repository }}
  APP_HOST: ${{ vars.APP_HOST || 'alpha.fobssms.com' }}
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://alpha.fobssms.com' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://alpha.api.fobssms.com/api' }}
  NEXT_PUBLIC_SEED_DEMO: ${{ vars.NEXT_PUBLIC_SEED_DEMO || 'false' }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SEED_DEMO: ${{ env.NEXT_PUBLIC_SEED_DEMO }}
        run: npm run build

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: verify
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      environment: ${{ steps.meta.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_name="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${image_name}"
          short_sha="${GITHUB_SHA::12}"
          cache_ref="${image}:buildcache"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            environment="${{ inputs.environment }}"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            environment="production"
          else
            environment="staging"
          fi

          {
            echo "image=${image}"
            echo "image_tag=${short_sha}"
            echo "cache_ref=${cache_ref}"
            echo "environment=${environment}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD || github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: app
          pull: true
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SEED_DEMO=${{ env.NEXT_PUBLIC_SEED_DEMO }}
            BUILDKIT_INLINE_CACHE=1
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image }}:latest-${{ github.ref_name }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.environment }}
          cache-from: |
            type=gha,scope=${{ env.APP_SLUG }}-app
            type=registry,ref=${{ steps.meta.outputs.cache_ref }}
          cache-to: |
            type=gha,scope=${{ env.APP_SLUG }}-app,mode=max
            type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max

  deploy:
    name: Deploy ${{ needs.build.outputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name != 'pull_request'
    environment: ${{ needs.build.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes
        shell: bash
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_DATA:-}" ]; then
            echo "Missing required secret: KUBECONFIG_DATA" >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl get namespace "$KUBE_NAMESPACE" >/dev/null 2>&1 || kubectl create namespace "$KUBE_NAMESPACE"

      - name: Create image pull secret
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME || github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD || github.token }}
        run: |
          set -euo pipefail
          kubectl -n "$KUBE_NAMESPACE" create secret docker-registry "$IMAGE_PULL_SECRET" \
            --docker-server="$REGISTRY" \
            --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_PASSWORD" \
            --docker-email="ci@fobs-sms.local" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create runtime config
        shell: bash
        run: |
          set -euo pipefail
          cat > runtime.env <<EOF
          NODE_ENV=production
          HOSTNAME=0.0.0.0
          PORT=3000
          NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          NEXT_PUBLIC_SEED_DEMO=$NEXT_PUBLIC_SEED_DEMO
          EOF

          kubectl -n "$KUBE_NAMESPACE" create configmap fobs-sms-frontend-config \
            --from-env-file=runtime.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        shell: bash
        env:
          IMAGE_URL: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.image_tag }}
        run: |
          set -euo pipefail
          rm -rf rendered/project
          mkdir -p rendered/project
          cp "$DEPLOYMENT_PATH"/*.yaml rendered/project/
          find rendered/project -type f -name '*.yaml' -exec sed -i "s#ghcr.io/example/fobs-sms-frontend:latest#$IMAGE_URL#g" {} +
          find rendered/project -type f -name '*.yaml' -exec sed -i "s#alpha.fobssms.com#$APP_HOST#g" {} +

          kubectl -n "$KUBE_NAMESPACE" apply -f rendered/project/deployment.yaml
          kubectl -n "$KUBE_NAMESPACE" rollout status deployment/fobs-sms-frontend --timeout=300s

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl -n "${KUBE_NAMESPACE:-default}" get pods,svc,ingress || true
          kubectl -n "${KUBE_NAMESPACE:-default}" describe deployment fobs-sms-frontend || true
          kubectl -n "${KUBE_NAMESPACE:-default}" describe pods -l app.kubernetes.io/name=fobs-sms-frontend || true
          kubectl -n "${KUBE_NAMESPACE:-default}" logs deployment/fobs-sms-frontend --all-containers=true --tail=120 || true
